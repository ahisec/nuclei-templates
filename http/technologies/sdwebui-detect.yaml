id: sdwebui-detect

info:
  name: Stable Diffusion WebUI - Detect
  author: rxerium
  severity: info
  description: |
   Detected AUTOMATIC1111 Stable Diffusion WebUI instance. SD WebUI was the mostpopular open-source interface for Stable Diffusion image generation. Exposed instancesmay allow unauthenticated access to image generation capabilities and model files.
  reference:
    - https://github.com/AUTOMATIC1111/stable-diffusion-webui
  metadata:
    verified: true
    max-request: 1
    vendor: AUTOMATIC1111
    product: stable-diffusion-webui
    shodan-query: 'http.html:"hires_fix.js"'
  tags: tech,stable-diffusion,sdwebui,ai,image-generation,detect,discovery

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - contains_all(body, "hires_fix.js", "AUTOMATIC1111", "gradio_config")
          - status_code == 200
        condition: and
