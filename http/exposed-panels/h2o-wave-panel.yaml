id: h2o-wave-panel

info:
  name: H2O Wave ML Application Server - Detect
  author: rxerium
  severity: info
  description: |
    H2O Wave was detected. H2O Wave is an open-source Python development framework
    for building real-time interactive AI and ML web applications. The Wave server
    hosts applications built on the platform. Exposed instances may allow
    unauthenticated access to ML dashboards, data visualisations, and AI
    applications running on the platform.
  reference:
    - https://github.com/h2oai/wave
    - https://wave.h2o.ai/
  metadata:
    verified: true
    max-request: 1
    vendor: h2oai
    product: wave
    shodan-query: 'http.title:"H2O Wave"'
  tags: panel,h2o-wave,h2o,ml,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "h2o-wave"
          - "H2O Wave"
        condition: or

      - type: status
        status:
          - 200
