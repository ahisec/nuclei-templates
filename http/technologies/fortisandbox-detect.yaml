id: fortisandbox-detect

info:
  name: FortiSandbox Detection
  author: rxerium
  severity: info
  description: |
    FortiSandbox is Fortinet's advanced sandbox solution for threat analysis and malware detection.
    This template detects exposed FortiSandbox login and management interfaces.
  reference:
    - https://www.fortinet.com/content/dam/fortinet/assets/data-sheets/FortiSandbox.pdf
  metadata:
    max-request: 1
    verified: true
    vendor: fortinet
    product: fortisandbox
    shodan-query: http.title:"FortiSandbox"
  tags: fortinet,fortisandbox,panel,login,sandbox,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/ng/login?returnUrl=%2F"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>FortiSandbox</title>'

      - type: status
        status:
          - 200