id: dbgate-anonymous-access

info:
  name: DbGate Anonymous Access Detection
  author: benharvey-sage
  severity: high
  description: |
    Detects DbGate instances that allow anonymous access due to insecure default authentication settings.

    DbGate supports multiple authentication mechanisms, but when deployed without explicitly configuring authentication
    (e.g. via LOGIN, PASSWORD, OAUTH_AUTH, AD_URL, or AUTH_PROVIDER environment variables), the application defaults
    to a mode where no authentication is required.

    In this default state, unauthenticated users can obtain a valid JWT access token by sending a request to the
    authentication endpoint (e.g. POST /auth/login) with an arbitrary or anonymous identifier such as "amoid":"none".
    The server responds with a valid access token, which can then be used to access authenticated API endpoints.

    DbGate exposes numerous API endpoints for database management, query execution, and metadata access.
    With a valid token, an unauthenticated user may gain access to configured database connections and perform
    administrative actions depending on the deployment.

    This behavior represents an insecure default configuration rather than a traditional misconfiguration,
    and may lead to unintended exposure of databases and sensitive information if the service is publicly accessible.

  reference:
    - https://github.com/dbgate/dbgate
    - https://dbgate.io/
    - https://docs.dbgate.io/
  classification:
    cwe-id: CWE-1188
  metadata:
    verified: true
    max-request: 1
    vendor: dbgate
    product: dbgate
    shodan-query:
      - http.title:"DbGate"
      - http.favicon.hash:-1320884137,1198579728,361029891,-1421367029,1377130137,-1258062033
  tags: dbgate,api,auth,misconfiguration,exposure,oss,panel

http:
  - raw:
      - |
        POST /auth/login HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {"amoid":"none"}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "accessToken"

    extractors:
      - type: json
        name: access_token
        part: body
        internal: true
        json:
          - '.accessToken'
