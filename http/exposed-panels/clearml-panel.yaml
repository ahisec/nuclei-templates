id: clearml-panel

info:
  name: ClearML Panel - Detect
  author: rxerium
  severity: info
  description: |
    ClearML was detected. ClearML is an open-source MLOps platform for experiment
    tracking, model management, and pipeline orchestration. Exposed instances may
    allow access to ML experiments, models, and infrastructure configurations.
  reference:
    - https://github.com/allegroai/clearml
    - https://clear.ml/
  metadata:
    verified: true
    max-request: 1
    vendor: allegro
    product: clearml
    shodan-query: 'http.title:"ClearML"'
  tags: panel,clearml,mlops,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "ClearML"

      - type: status
        status:
          - 200
