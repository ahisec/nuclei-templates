id: glitchtip-public-signup

info:
  name: Gitea Public Registration Enabled
  author: DhiyaneshDk
  severity: medium
  description: |
    A misconfiguration in GlitchTip allows arbitrary users to sign up.
  reference:
    - https://glitchtip.com/documentation/install
  metadata:
    verified: true
    max-request: 1
    shodan-query: html:"GlitchTip"
  tags: misconfig,glitchtip,vuln

http:
  - method: GET
    path:
      - '{{BaseURL}}/api/settings/'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '"enableUserRegistration": true'
          - 'enableSocialAppsUserRegistration'
        condition: and

      - type: status
        status:
          - 200
