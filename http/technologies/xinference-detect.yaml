id: xinference-detect

info:
  name: Xinference - Detect
  author: rxerium
  severity: info
  description: |
    Xinference (Xorbits Inference) was detected. Xinference is a distributed LLM inference
    framework supporting multiple model types including LLMs, embeddings, and multimodal
    models. The API endpoint exposes an OpenAI-compatible interface with model information.
  reference:
    - https://github.com/xorbitsai/inference
    - https://inference.readthedocs.io/
  metadata:
    verified: true
    max-request: 1
    vendor: xorbitsai
    product: xinference
    shodan-query: 'port:9997 http.html:"xinference"'
  tags: tech,xinference,llm,inference,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/v1/models"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"owned_by":"xinference"'

      - type: status
        status:
          - 200
