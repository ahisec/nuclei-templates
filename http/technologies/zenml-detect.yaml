id: zenml-detect

info:
  name: ZenML MLOps Dashboard - Detect
  author: rxerium
  severity: info
  description: |
    ZenML Dashboard was detected. ZenML is an open-source MLOps framework for
    building and managing portable, reproducible ML pipelines. The self-hosted
    dashboard provides access to pipeline runs, artifact stores, model registries,
    and connected cloud infrastructure. Exposed instances may allow unauthenticated
    access to ML pipeline data and infrastructure credentials.
  reference:
    - https://github.com/zenml-io/zenml
    - https://zenml.io/
  metadata:
    verified: true
    max-request: 1
    vendor: zenml-io
    product: zenml
    shodan-query: 'http.title:"ZenML Dashboard"'
  tags: tech,zenml,mlops,ml,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>ZenML Dashboard"

      - type: status
        status:
          - 200
