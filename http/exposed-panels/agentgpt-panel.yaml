id: agentgpt-panel

info:
  name: AgentGPT Panel - Detect
  author: rxerium
  severity: info
  description: |
    AgentGPT was detected. AgentGPT is a browser-based autonomous AI agent platform
    that allows users to create, configure and deploy AI agents directly in the browser.
    Self-hosted instances expose the agent configuration interface.
  reference:
    - https://github.com/reworkd/AgentGPT
    - https://agentgpt.reworkd.ai/
  metadata:
    verified: true
    max-request: 1
    vendor: reworkd
    product: agentgpt
    shodan-query: 'http.title:"AgentGPT"'
  tags: panel,agentgpt,agent,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>AgentGPT</title>"

      - type: status
        status:
          - 200
