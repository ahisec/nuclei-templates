id: apache-skywalking-default-login

info:
  name: Apache SkyWalking - Default Login
  author: icarot
  severity: high
  description: |
    Apache SkyWalking server, an APM, Application Performance Monitoring System, enables default admin credentials. An attacker can execute unauthorized operations.
  reference:
    - https://github.com/apache/skywalking
    - https://github.com/apache/skywalking-ui
    - https://skywalking.apache.org/docs/skywalking-banyandb/next/operation/security/#authentication
  metadata:
    max-request: 9
    vendor: apache
    product: skywalking
    shodan-query: title:"Apache SkyWalking"
  tags: apache,skywalking,default-login

http:
  - raw:
      - |
        GET /debugging/config/dump HTTP/1.1
        Host: {{Hostname}}
        Authorization: Basic {{base64("{{username}}:{{password}}")}}
    attack: clusterbomb
    payloads:
      username:
        - skywalking
        - admin
        - dev_user
      password:
        - skywalking
        - StrongPassword123
        - 888888

    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Skywalking'
          - 'skywalking'
        condition: or
      - type: status
        status:
          - 200
