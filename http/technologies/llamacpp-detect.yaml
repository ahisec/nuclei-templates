id: llamacpp-detect

info:
  name: llama.cpp - Detect
  author: rxerium
  severity: info
  description: |
    Detected llama.cpp, a lightweight C/C++ inference engine for running GGUF-format
    large language models locally. Exposed instances serve an OpenAI-compatible REST
    API and a built-in web chat interface with no authentication by default.
  reference:
    - https://github.com/ggerganov/llama.cpp
  metadata:
    verified: true
    max-request: 1
    vendor: ggerganov
    product: llama.cpp
    shodan-query: 'http.headers.server:"llama.cpp"'
  tags: tech,llamacpp,llm,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}/health"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "llama.cpp"

      - type: word
        part: body
        words:
          - '"status":"ok"'

      - type: status
        status:
          - 200
