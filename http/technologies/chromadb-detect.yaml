id: chromadb-detect

info:
  name: ChromaDB Vector Database - Unauthenticated Instance Detected
  author: rxerium
  severity: info
  description: |
    Detects a publicly exposed ChromaDB vector database using two reliable body-based
    fingerprint traits confirmed across all deployment configurations:
  reference:
    - https://docs.trychroma.com/
  tags: chromadb,vector-database,ai,exposure,fingerprint,detect

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v2"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "nanosecond heartbeat"

    extractors:
      - type: regex
        name: heartbeat_ns
        part: body
        regex:
          - '"nanosecond heartbeat":\\s*([0-9]+)'
        internal: true

  - method: GET
    path:
      - "{{BaseURL}}/api/v2/version"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        regex:
          - '^"[0-9]+\\.[0-9]+\\.[0-9]+"$'

    extractors:
      - type: regex
        name: version
        part: body
        regex:
          - '"([0-9]+\\.[0-9]+\\.[0-9]+)"'
        group: 1
