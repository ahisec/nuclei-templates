id: weights-biases-detect

info:
  name: Weights & Biases - Detect
  author: rxerium
  severity: info
  description: |
    A self-hosted Weights & Biases (W&B) instance was detected. W&B is a popular MLOps
    platform for experiment tracking, model versioning, and collaborative ML development.
    Self-hosted deployments expose the full experiment management interface.
  reference:
    - https://github.com/wandb/wandb
    - https://wandb.ai/
  metadata:
    verified: true
    max-request: 1
    vendor: wandb
    product: weights-and-biases
    shodan-query: 'http.html:"wandb" http.title:"Weights & Biases"'
  tags: tech,weights-biases,wandb,mlops,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Weights &amp; Biases"

      - type: status
        status:
          - 200
