id: clearml-panel

info:
  name: ClearML Panel - Detect
  author: rxerium
  severity: info
  description: |
    ClearML was detected. ClearML is an open-source MLOps platform for experiment tracking, model management, and pipeline orchestration. Exposed instances may allow access to ML experiments, models, and infrastructure configurations.
  reference:
    - https://github.com/allegroai/clearml
    - https://clear.ml/
  metadata:
    verified: true
    max-request: 1
    vendor: allegro
    product: clearml
    shodan-query: 'http.title:"ClearML"'
  tags: panel,clearml,mlops,ai,detect,discovery

http:
  - raw:
      - |
        GET / HTTP/1.1
        Host: {{Hostname}}

    redirects: true
    max-redirects: 2

    matchers:
      - type: dsl
        dsl:
          - status_code == 200
          - contains_all(body, "ClearML", "automate and orchestrate your ML stack")
        condition: and
