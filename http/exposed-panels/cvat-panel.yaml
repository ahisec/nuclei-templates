id: cvat-panel

info:
  name: CVAT Computer Vision Annotation Tool - Detect
  author: rxerium
  severity: info
  description: |
    CVAT (Computer Vision Annotation Tool) was detected. CVAT is a widely used
    open-source annotation platform for labelling images, video, and 3D point
    clouds used to train AI/ML computer vision models. Exposed instances may allow
    unauthenticated access to annotation projects, training datasets, and team
    workflows.
  reference:
    - https://github.com/cvat-ai/cvat
    - https://cvat.ai/
  metadata:
    verified: true
    max-request: 1
    vendor: cvat-ai
    product: cvat
    shodan-query: 'http.title:"Computer Vision Annotation Tool"'
  tags: panel,cvat,annotation,ml,ai,detect,discovery

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    host-redirects: true
    max-redirects: 2

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Computer Vision Annotation Tool"

      - type: status
        status:
          - 200
